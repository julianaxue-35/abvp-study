<style>
  :root{
    --paper:#F6F2E9; --paper2:#EFEADD; --ink:#21201B; --soft:#5B584F; --faint:#8C887C;
    --card:#FFFDF8; --line:rgba(33,32,27,0.12); --line2:rgba(33,32,27,0.2);
    --ok:#0F6E56; --okbg:#E1F5EE; --no:#9A3B23; --nobg:#FAECE7;
    --serif:"Fraunces",Georgia,serif; --sans:"Spline Sans",-apple-system,sans-serif;
    --r:12px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  .wrap{max-width:980px;margin:0 auto;padding:0 20px 80px}
  .crumb{font-size:13px;color:var(--soft);margin:22px 0 6px;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
  .crumb a{cursor:pointer;color:var(--soft);text-decoration:none;border-bottom:1px solid transparent}
  .crumb a:hover{border-bottom-color:var(--line2);color:var(--ink)}
  .crumb .sep{color:var(--faint)}
  h1.page{font-family:var(--serif);font-weight:600;font-size:30px;letter-spacing:-0.015em;margin:4px 0 6px;line-height:1.1}
  .lede{color:var(--soft);max-width:62ch;margin:0 0 26px}
  .stats{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 28px}
  .stat{background:var(--paper2);border-radius:10px;padding:11px 16px;min-width:110px}
  .stat b{display:block;font-family:var(--serif);font-size:22px;font-weight:600;line-height:1}
  .stat span{font-size:12px;color:var(--soft)}
  .prog{height:6px;border-radius:999px;background:var(--paper2);overflow:hidden}
  .prog i{display:block;height:100%;border-radius:999px}
  .topics{display:flex;flex-wrap:wrap;gap:8px;padding:2px 16px 14px}
  .tchip{font-size:13px;border:0.5px solid var(--line2);border-radius:999px;padding:6px 13px;cursor:pointer;background:var(--paper);transition:all .12s;display:inline-flex;align-items:center;gap:7px}
  .tchip:hover{background:var(--paper2)}
  .tchip.ready{border-color:var(--ok);color:var(--ok)}
  .tchip .dot{width:7px;height:7px;border-radius:50%}
  .tabs{display:flex;gap:4px;border-bottom:0.5px solid var(--line);margin:18px 0 0}
  .tab{padding:10px 16px;cursor:pointer;font-weight:500;font-size:14.5px;color:var(--soft);border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab.on{color:var(--ink);border-bottom-color:var(--ink)}
  .panel{padding:22px 0 0}
  .status{display:inline-block;font-size:11.5px;font-weight:500;letter-spacing:0.03em;text-transform:uppercase;padding:4px 10px;border-radius:999px}
  .status.ready{background:var(--okbg);color:var(--ok)}
  .status.todo{background:var(--paper2);color:var(--soft)}
  .doc h2{font-family:var(--serif);font-weight:600;font-size:20px;letter-spacing:-0.01em;margin:26px 0 8px}
  .doc h2:first-child{margin-top:0}
  .doc p{margin:0 0 10px}
  .doc ul{margin:0 0 12px;padding-left:20px}
  .doc li{margin:0 0 5px}
  .doc strong{font-weight:500}
  .doc .src{font-size:12.5px;color:var(--faint);border-top:0.5px solid var(--line);padding-top:10px;margin-top:22px}
  table.cmp{width:100%;border-collapse:collapse;margin:6px 0 14px;font-size:14px}
  table.cmp th,table.cmp td{text-align:left;padding:9px 12px;border-bottom:0.5px solid var(--line);vertical-align:top}
  table.cmp th{font-weight:500;color:var(--soft);font-size:12.5px}
  table.cmp td:first-child{color:var(--soft);width:30%}
  .pill{display:inline-block;font-weight:500;font-size:12.5px;padding:3px 11px;border-radius:8px}
  .pill.felv{background:var(--nobg);color:var(--no)}
  .pill.fiv{background:#E7EFF8;color:#1F5C9E}
  .key{background:var(--paper2);border-radius:var(--r);padding:14px 18px;margin:14px 0}
  .key h3{font-family:var(--serif);font-size:16px;font-weight:600;margin:0 0 8px}
  .key ul{margin:0;padding-left:18px}
  svg.dia{width:100%;height:auto;display:block;background:var(--card);border:0.5px solid var(--line);border-radius:var(--r);padding:10px}
  .diacap{font-size:13px;color:var(--soft);margin:10px 0 26px;line-height:1.5}
  .qhead{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;background:var(--paper2);border-radius:var(--r);padding:13px 18px;margin-bottom:18px}
  .qscore{font-family:var(--serif);font-weight:600;font-size:17px}
  .qscore span{color:var(--soft);font-family:var(--sans);font-weight:400;font-size:13px}
  .btn{font-family:var(--sans);font-size:13.5px;font-weight:500;border:0.5px solid var(--line2);background:var(--card);border-radius:9px;padding:8px 15px;cursor:pointer;transition:background .12s}
  .btn:hover{background:var(--paper)}
  .q{background:var(--card);border:0.5px solid var(--line);border-radius:var(--r);padding:18px 20px;margin-bottom:16px}
  .q .stem{font-weight:500;margin-bottom:12px;line-height:1.45}
  .q .stem b{font-family:var(--serif);color:var(--soft);margin-right:8px;font-weight:600}
  .opt{display:block;width:100%;text-align:left;border:0.5px solid var(--line2);background:var(--paper);border-radius:9px;padding:11px 14px;margin-bottom:8px;cursor:pointer;font:inherit;transition:all .12s;line-height:1.4}
  .opt:hover:not(:disabled){background:var(--paper2)}
  .opt:disabled{cursor:default}
  .opt.correct{background:var(--okbg);border-color:var(--ok);color:#0b4d3d}
  .opt.wrong{background:var(--nobg);border-color:var(--no);color:#6e2a18}
  .opt .mk{float:right;font-weight:600}
  .rat{font-size:13.5px;color:var(--soft);background:var(--paper2);border-radius:9px;padding:11px 14px;margin-top:4px;line-height:1.5}
  .rat b{color:var(--ink);font-weight:500}
  .placeholder{background:var(--card);border:0.5px dashed var(--line2);border-radius:var(--r);padding:30px 24px;text-align:center;color:var(--soft)}
  .placeholder h3{font-family:var(--serif);font-size:18px;color:var(--ink);margin:0 0 8px}
  .placeholder p{max-width:48ch;margin:0 auto 4px}
  .foot{margin-top:36px;font-size:12px;color:var(--faint);line-height:1.6}
  @media(max-width:600px){h1.page{font-size:25px}.stat{flex:1}}
  /* Hero */
  .hero{background:linear-gradient(135deg,#0f4c35 0%,#1a6e4f 45%,#0d3d6b 100%);padding:22px 20px 22px;margin:0 -20px}
  .hero-eye{font-size:10px;color:rgba(255,255,255,.55);letter-spacing:.14em;text-transform:uppercase;margin-bottom:5px}
  .hero-title{font-family:var(--serif);font-size:38px;font-weight:600;color:#fff;line-height:1.1;margin:0 0 16px;cursor:pointer}
  .hero-pills{display:flex;gap:10px;flex-wrap:wrap}
  .hero-pill{background:rgba(255,255,255,.15);border-radius:10px;padding:8px 16px;text-align:center}
  .hero-pill b{display:block;font-size:20px;font-weight:700;color:#fff;line-height:1}
  .hero-pill span{font-size:9px;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.08em;margin-top:1px;display:block}
  .hero-pill.rpill{background:rgba(110,231,183,.18);border:1px solid rgba(110,231,183,.4)}
  .hero-pill.rpill b{color:#6ee7b7}
  .hero-pill.rpill span{color:rgba(110,231,183,.75)}
  /* Search */
  .search-wrap{position:relative;margin:16px 0 0}
  .search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--faint)}
  .search-input{width:100%;padding:10px 18px 10px 40px;border-radius:999px;border:1.5px solid var(--line2);background:#fff;font-size:14px;font-family:var(--sans);outline:none}

  .section-label{font-size:10px;color:#999;letter-spacing:.08em;text-transform:uppercase;margin:18px 0 8px}
  /* Tile grid */
  .dtile-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .dtile{border-radius:14px;padding:16px;position:relative;transition:transform .15s}
  .dtile:not(.faded){cursor:pointer}
  .dtile:not(.faded):hover{transform:translateY(-1px)}
  .dtile.faded{opacity:.6;cursor:default}
  .dtile-emoji{font-size:30px;margin-bottom:8px}
  .dtile-name{font-size:13px;font-weight:700;color:#fff;line-height:1.25}
  .dtile-count{font-size:10px;color:rgba(255,255,255,.6);margin-top:4px}
  .dtile-badge{position:absolute;top:11px;right:11px;border-radius:20px;font-size:9px;font-weight:700;padding:2px 8px}
  /* Domain header */
  .domain-header{padding:20px 24px 18px;margin:0 -20px 0}
  .domain-back{font-size:10px;color:rgba(255,255,255,.5);cursor:pointer;margin-bottom:4px;letter-spacing:.1em;text-transform:uppercase;display:inline-block}
  .domain-back:hover{color:rgba(255,255,255,.8)}
  .domain-title{font-family:var(--serif);font-size:22px;font-weight:600;color:#fff;line-height:1.1;margin:0 0 10px}
  .domain-pills{display:flex;gap:8px;flex-wrap:wrap}
  .domain-pill{background:rgba(255,255,255,.15);border-radius:20px;font-size:11px;color:rgba(255,255,255,.8);padding:3px 10px}
  .domain-pill.rpill{background:rgba(110,231,183,.2);border:1px solid rgba(110,231,183,.4);color:#6ee7b7}
  /* Subdomain cards */
  .scards{background:#f2ede4;padding:14px;display:flex;flex-direction:column;gap:8px;margin:0 -20px}
  .scard{background:#fff;border-radius:12px;padding:13px 16px;display:flex;align-items:center;gap:14px;box-shadow:0 1px 4px rgba(0,0,0,.07)}

  .scard.no-url{opacity:.65}
  .scard-emoji{font-size:22px;flex-shrink:0}
  .scard-name{font-size:14px;font-weight:600;flex:1}
  .scard-sub{font-size:11px;color:#888;margin-top:2px}
  .scard-arrow{font-size:18px}
  .scard-soon{font-size:11px;color:#aaa;background:#f5f5f5;padding:2px 8px;border-radius:6px;white-space:nowrap}
  .supp-divider{display:flex;align-items:center;gap:10px;padding:4px 14px;margin:0 -20px;background:#f2ede4;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#a09888}
  .supp-divider::before,.supp-divider::after{content:"";flex:1;border-top:1px dashed #c8bfb0}
  /* Search results */
  .search-results{margin-top:12px;display:flex;flex-direction:column;gap:8px}
  .no-results{color:var(--faint);font-size:14px;padding:20px 0;text-align:center}
</style>
</head>

<!-- PASSCODE GATE -->
<div id="app-gate" style="position:fixed;inset:0;z-index:99999;background:#1F4842;display:flex;align-items:center;justify-content:center;padding:20px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
  <div style="background:#fff;border-radius:14px;padding:28px 24px;max-width:340px;width:100%;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.3);">
    <div style="font-size:21px;font-weight:800;color:#1F4842;">ABVP Study Hub</div>
    <div style="font-size:13px;color:#4A5550;margin:4px 0 18px;">Enter passcode to continue</div>
    <input id="gate-input" type="password" autocomplete="off" autocapitalize="off" placeholder="Passcode" style="width:100%;padding:11px;border:1px solid #DDD8CA;border-radius:8px;font-size:16px;text-align:center;margin-bottom:10px;box-sizing:border-box;">
    <button id="gate-btn" style="width:100%;padding:11px;border:none;border-radius:8px;background:#1F4842;color:#fff;font-size:15px;font-weight:700;cursor:pointer;">Unlock</button>
    <div id="gate-err" style="color:#8B2A1E;font-size:12px;margin-top:8px;height:14px;"></div>
  </div>
</div>
<script>
(function(){
  var HASH='a93a7a58c68bef6b72efb1ffe7dbe937c653062781d257e709786d4df053b487';
  var KEY='abvp_gate_v1';
  var gate=document.getElementById('app-gate');
  if(localStorage.getItem(KEY)===HASH){gate.parentNode.removeChild(gate);return;}
  document.documentElement.style.overflow='hidden';
  async function sha(s){var b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0');}).join('');}
  async function submit(){
    var v=(document.getElementById('gate-input').value||'').trim();
    if(await sha(v)===HASH){localStorage.setItem(KEY,HASH);document.documentElement.style.overflow='';gate.parentNode.removeChild(gate);}
    else{document.getElementById('gate-err').textContent='Incorrect passcode';document.getElementById('gate-input').select();}
  }
  document.getElementById('gate-btn').addEventListener('click',submit);
  document.getElementById('gate-input').addEventListener('keydown',function(e){if(e.key==='Enter')submit();});
  try{document.getElementById('gate-input').focus();}catch(e){}
})();
</script>

var FELV_SUMMARY = ''
+'<h2>Snapshot</h2><ul>'
+'<li>Both in family <strong>Retroviridae</strong>. FeLV = gammaretrovirus (oncornavirus); FIV = lentivirus. Host is the cat. <strong>Neither is zoonotic.</strong></li>'
+'<li>Both cause chronic infection with low transmission rate, so shelter <strong>outbreaks are not expected</strong>.</li>'
+'<li>Higher seroprevalence in males, ill cats, outdoor/roaming cats, fighters and hoarding-origin cats. Indoor lifestyle and sterilisation lower risk.</li></ul>'
+'<h2>Transmission</h2><ul>'
+'<li><strong>FeLV (friendly):</strong> saliva via nursing, mutual grooming, shared bowls, and bites. Major route is queen to kitten (in utero or nursing/grooming).</li>'
+'<li><strong>FIV (unfriendly):</strong> mainly bite wounds from fighting. Queen-to-kitten is uncommon in nature; FIV antibody in milk protects most nursing kittens. Sexual transmission is not a meaningful threat. FIV-positive cats can co-house with negatives if there is no fighting.</li>'
+'<li>Both transmit efficiently via contaminated instruments and blood transfusion.</li></ul>'
+'<h2>FeLV outcomes after exposure</h2><ul>'
+'<li><strong>Abortive (~20-30%):</strong> robust immune clearance. Antigen, IFA and PCR all negative.</li>'
+'<li><strong>Regressive (~30-40%):</strong> early viremia suppressed but provirus integrates into marrow. Antigen negative, IFA negative, low proviral copy number on PCR. Low shedding, low disease risk, but can reactivate years later. This is the diagnostic trap (see the Diagram tab).</li>'
+'<li><strong>Progressive (~30-40%):</strong> viremia not contained, virus disseminates and sheds in secretions. Antigen positive, IFA positive, high proviral load. Continuously infectious, at risk of FeLV-associated disease.</li>'
+'<li><strong>Focal / atypical (uncommon):</strong> intermittent or weak antigenaemia with virus restricted to a tissue (e.g. mammary gland, eye). Worth knowing for a specialty exam.</li></ul>'
+'<h2>FIV course (three stages)</h2><ul>'
+'<li><strong>Acute:</strong> transient fever and lymphadenopathy over roughly 1-3 months, often unnoticed.</li>'
+'<li><strong>Asymptomatic / latent:</strong> frequently years, often lifelong, with continuous virus shedding.</li>'
+'<li><strong>Progressive / terminal:</strong> immunodeficiency with opportunistic infection, stomatitis and neoplasia.</li></ul>'
+'<h2>Diagnosis</h2><ul>'
+'<li><strong>Point-of-care combo:</strong> detects FeLV antigen (p27 core protein) and FIV antibody. Antigen positive = active infection now; antibody positive = exposure/infection or prior vaccination.</li>'
+'<li><strong>IFA (FeLV):</strong> detects p27 in leukocyte/platelet cytoplasm, i.e. marrow infection. Negative in regressive, positive in progressive once marrow is involved.</li>'
+'<li><strong>PCR:</strong> detects provirus (and RNA). Low proviral copy number marks regressive infection and longer survival; high copy number marks progressive. FIV PCR confirms most field cases, though some strains escape detection.</li>'
+'<li><strong>Western blot:</strong> largely replaced by PCR for follow-up in shelters.</li>'
+'<li><strong>Predictive value:</strong> positive predictive value falls as prevalence falls, so confirm positives in healthy, low-risk cats before acting.</li>'
+'<li><strong>Retest windows:</strong> FeLV ~30 days post-exposure; FIV ~60 days (antibody seroconversion lag).</li>'
+'<li><strong>Kittens:</strong> maternal antibody can cause false-positive FIV (retest ~5-6 months). About half of neonates initially antigen-positive for FeLV revert by adoption age, so retest at adoption age.</li></ul>'
+'<h2>FeLV vs FIV at a glance</h2>'
+'<table class="cmp"><tr><th></th><th><span class="pill felv">FeLV</span></th><th><span class="pill fiv">FIV</span></th></tr>'
+'<tr><td>Screening detects</td><td>Antigen (p27)</td><td>Antibody</td></tr>'
+'<tr><td>Positive screen means</td><td>Active infection now</td><td>Exposure/infection, or vaccination</td></tr>'
+'<tr><td>Confirm with</td><td>Quantitative PCR; IFA</td><td>PCR</td></tr>'
+'<tr><td>Lifelong?</td><td>Abortive clears; regressive latent; progressive lifelong</td><td>Yes, lifelong</td></tr>'
+'<tr><td>Lifespan</td><td>Often shortened</td><td>Often normal if managed</td></tr>'
+'<tr><td>Co-housing</td><td>Separate positives from negatives</td><td>Can co-house if no fighting</td></tr></table>'
+'<h2>Prevention and management</h2><ul>'
+'<li><strong>Housing:</strong> house FeLV-positive cats separately by status. Both viruses are enveloped and labile, not spread by air or casual handling, so no special sanitation is needed beyond routine disinfection.</li>'
+'<li><strong>FeLV vaccine:</strong> non-core. AAFP recommends vaccinating all kittens and at-risk adults. It induces envelope antibody and does <strong>not</strong> cause p27 antigenaemia, so it does not interfere with antigen testing.</li>'
+'<li><strong>FIV vaccine:</strong> for the ABVP (US) exam, treat as discontinued and not recommended; antibody vaccination confounds serology. (Note: still available in Australia with intermittent supply, efficacy near 50%.)</li>'
+'<li><strong>Outcome:</strong> a positive retrovirus test is not a reason for euthanasia. Care is supportive (treat secondary infection, dental disease, nutrition, stress reduction). Both FeLV+ and FIV+ cats are adoptable.</li></ul>'
+'<div class="key"><h3>Exam high-yield traps</h3><ul>'
+'<li>Regressive FeLV reads negative on routine antigen/IFA but is PCR low-positive. This is why blood donors need PCR, not just antigen screening.</li>'
+'<li>Antigen = current infection. Antibody = exposure or vaccine. Do not confuse the two test logics.</li>'
+'<li>Never euthanise or group-house on a single screening result, especially in kittens and low-prevalence populations.</li>'
+'<li>Pooling samples or testing one cat as a proxy for a group is not acceptable (reduces sensitivity).</li></ul></div>'
+'<p class="src">Sources: AAFP Feline Retrovirus Management Guidelines; AAFP Vaccination Guidelines (2020); Infectious Disease Management in Animal Shelters (Miller, Hurley, Janeczko); ASV Guidelines for Standards of Care. Note: regional prevalence figures and the whole-blood vs serum/plasma sensitivity point in the source notes are pending verification.</p>';

var FELV_QUIZ = [
 {stem:"A motherless 8-week-old kitten tests antigen-positive for FeLV on a point-of-care test at intake. The most appropriate action is to:",
  opts:["euthanise based on the positive result","retest at adoption age, as a substantial proportion of neonates revert to negative","place immediately into group kitten housing"],ans:1,
  rat:"Roughly half of antigen-positive neonates revert by adoption age. Never euthanise or group-house on a single screen."},
 {stem:"An asymptomatic adult cat in a low-prevalence healthy population has a single antibody-positive FIV point-of-care result. The best interpretation is:",
  opts:["confirmed lifelong FIV infection","positive predictive value is relatively low here, so confirm before acting on it","evidence of recent FIV vaccination only"],ans:1,
  rat:"Positive predictive value tracks prevalence. In low-risk, healthy cats a single positive carries a higher false-positive chance, so confirm with PCR."},
 {stem:"Which result pattern best fits regressive FeLV infection?",

var TOPICS = {
 "felv-fiv":{name:"FeLV and FIV",status:"ready",summary:FELV_SUMMARY,diagram:FELV_SVG,quiz:FELV_QUIZ},
 "cpv":{name:"Canine parvovirus (CPV)",status:"todo"},
 "cdv":{name:"Canine distemper (CDV)",status:"todo"},
 "fpv":{name:"Feline panleukopenia (FPV)",status:"todo"},

};

/* ---------- STATE + RENDER ---------- */
var S={view:"home"};
var quizState={};

function topicReady(id){return TOPICS[id]&&TOPICS[id].status==="ready";}
function domainCounts(d){
  var total=0,ready=0;
  d.subs.forEach(function(s){
    if(s.topics){
      s.topics.forEach(function(t){total++;if(topicReady(t))ready++;});
      if(s.url){total++;ready++;}
    }else{
      total++;
      if(s.url)ready++;
    }
  });
  return {total:total,ready:ready};
}
function allCounts(){var t=0,r=0;DOMAINS.forEach(function(d){var c=domainCounts(d);t+=c.total;r+=c.ready;});return{t:t,r:r};}

function nav(view,a,b){S.view=view;S.dom=a;S.sub=b;if(view==="topic"){quizState={};}window.scrollTo(0,0);render();}

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function dtileBadge(bgColor){
  return {bg:"rgba(110,231,183,.2)",border:"rgba(110,231,183,.4)",text:"#6ee7b7"};
}

function render(){
  var app=document.getElementById("app");
  if(S.view==="home")app.innerHTML=renderHome();
  else if(S.view==="domain")app.innerHTML=renderDomain(S.dom);
  else if(S.view==="topic")app.innerHTML=renderTopic(S.dom);
}

function renderHome(){
  var tots=0,readyDoms=0;
  DOMAINS.forEach(function(d){
    tots+=d.subs.length;
    if(d.weight!==undefined&&d.subs.some(function(s){return !!s.url;}))readyDoms++;
  });
  var h='<div class="hero">';
  h+='<div class="hero-eye">2026 ABVP Exam Prep &middot; RVS</div>';
  h+='<div class="hero-title" onclick="nav(\'home\')">Shelter Medicine<br>Study Hub</div>';
  h+='<div class="hero-pills">';
  h+='<div class="hero-pill"><b>'+DOMAINS.length+'</b><span>Domains</span></div>';
  h+='<div class="hero-pill"><b>'+tots+'</b><span>Topics</span></div>';
  h+='<div class="hero-pill rpill"><b>'+readyDoms+'/7</b><span>Ready</span></div>';
  h+='</div></div>';
  h+='<a href="mock-exam.html" style="display:block;margin:14px 0 2px;background:linear-gradient(135deg,#6ee7b7,#34d399);color:#0f3d3a;text-align:center;padding:14px;border-radius:12px;font-weight:700;text-decoration:none;font-size:15.5px;box-shadow:0 6px 18px rgba(15,61,58,.18)">📝 Take a Mock Exam Day &nbsp;·&nbsp; blueprint-weighted 350-item simulation →</a>';
  h+='<div class="search-wrap">';
  h+='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>';
  h+='<input class="search-input" type="search" placeholder="Search topics… e.g. FeLV, ringworm, euthanasia" oninput="onSearch(this.value)" id="searchbox">';
  h+='</div>';
  h+='<div id="search-results-panel" style="display:none"></div>';
  h+='<div id="domain-grid">';
  h+='<div class="section-label">Exam Domains</div>';
  h+='<div class="dtile-grid">';
  DOMAINS.forEach(function(d,i){
    var hasUrl=d.subs.some(function(s){return !!s.url;});
    var spanFull=(i===DOMAINS.length-1&&DOMAINS.length%2===1);
    h+='<div class="dtile'+(hasUrl?'':' faded')+'"';
    h+=' style="background:'+d.color+(spanFull?';grid-column:1/-1':'')+'"';
    if(hasUrl)h+=' onclick="nav(\'domain\',\''+d.id+'\')"';
    h+='>';
    h+='<div class="dtile-emoji">'+d.emoji+'</div>';
    h+='<div class="dtile-name">'+d.name+'</div>';
    h+='<div class="dtile-count">'+d.subs.length+' topics'+(hasUrl?'':' · coming soon')+'</div>';
    if(hasUrl){var b=dtileBadge(d.color);h+='<div class="dtile-badge" style="background:'+b.bg+';border:1px solid '+b.border+';color:'+b.text+'">✓</div>';}
    h+='</div>';
  });
  h+='</div></div>';
  h+='<div class="foot">Standalone study aid built from your notes. Content is baked in — nothing is lost if it is rebuilt. Not a substitute for primary ABVP sources.</div>';
  return h;
}

function onSearch(q){
  var grid=document.getElementById("domain-grid");
  var panel=document.getElementById("search-results-panel");
  q=(q||"").trim();
  if(!q){grid.style.display="";panel.style.display="none";panel.innerHTML="";return;}
  grid.style.display="none";
  var ql=q.toLowerCase();
  var results=[];
  DOMAINS.forEach(function(d){
    d.subs.forEach(function(s){
      if(s.name.toLowerCase().indexOf(ql)>=0)results.push({s:s,d:d});
    });
  });
  var h='<div class="search-results">';
  if(!results.length){
    h+='<div class="no-results">No topics found for "'+esc(q)+'"</div>';
  }else{
    results.forEach(function(r){
      var s=r.s,d=r.d,hasUrl=!!s.url;
      h+='<div class="scard'+(hasUrl?'':' no-url')+'" style="border-left:4px solid '+d.color+'"';
      if(hasUrl)h+=' onclick="window.location.href=\''+s.url+'\'"';
      h+='>';
      h+='<div class="scard-emoji">'+(s.emoji||"📄")+'</div>';
      h+='<div style="flex:1"><div class="scard-name" style="color:'+d.color+'">'+s.name+'</div>';
      h+='<div class="scard-sub">'+d.emoji+' '+d.name+'</div></div>';
      if(hasUrl)h+='<div class="scard-arrow" style="color:'+d.color+'">›</div>';
      else h+='<div class="scard-soon">coming soon</div>';
      h+='</div>';
    });
  }
  h+='</div>';
  panel.innerHTML=h;
  panel.style.display="";
}

function renderDomain(id){
  var d=DOMAINS.filter(function(x){return x.id===id;})[0];
  var readySubs=d.subs.filter(function(s){return !!s.url;}).length;
  var total=d.subs.length;
  var h='<div class="domain-header" style="background:'+d.color+'">';
  h+='<div class="domain-back" onclick="nav(\'home\')">← Study Hub</div>';
  h+='<div class="domain-title">'+d.emoji+' '+d.name+'</div>';
  h+='<div class="domain-pills">';
  h+='<div class="domain-pill">'+total+' topics</div>';
  h+='<div class="domain-pill">'+(d.weight!==undefined?d.weight+'% of exam':'Supplementary')+'</div>';
  if(readySubs>0&&readySubs===total){
    h+='<div class="domain-pill rpill">✓ All ready</div>';
  }else if(readySubs>0){
    h+='<div class="domain-pill rpill">'+readySubs+' / '+total+' ready</div>';
  }
  h+='</div></div>';
  var coreSubs=d.subs.filter(function(s){return s.w!==undefined;});
  var suppSubs=d.subs.filter(function(s){return s.w===undefined;});
  var allSubs=coreSubs.length?coreSubs:d.subs;
  function renderScard(s){
    var hasUrl=!!s.url;
    var c='<div class="scard'+(hasUrl?'':' no-url')+'" style="border-left:4px solid '+d.color+'"';
    if(hasUrl)c+=' onclick="window.location.href=\''+s.url+'\'"';
    c+='><div class="scard-emoji">'+(s.emoji||"📄")+'</div>';
    c+='<div class="scard-name" style="color:'+d.color+'">'+s.name+'</div>';
    if(hasUrl)c+='<div class="scard-arrow" style="color:'+d.color+'">›</div>';
    else c+='<div class="scard-soon">coming soon</div>';
    return c+'</div>';
  }
  h+='<div class="scards">';
  allSubs.forEach(function(s){h+=renderScard(s);});
  h+='</div>';
  if(suppSubs.length){
    h+='<div class="supp-divider">Supplementary Material</div>';
    h+='<div class="scards">';
    suppSubs.forEach(function(s){h+=renderScard(s);});
    h+='</div>';
  }
  return h;
}

function findDomainOfTopic(tid){
  for(var i=0;i<DOMAINS.length;i++){var d=DOMAINS[i];for(var j=0;j<d.subs.length;j++){if(d.subs[j].topics&&d.subs[j].topics.indexOf(tid)>=0)return d;}}
  return null;
}

function renderTopic(tid){
  var t=TOPICS[tid];var d=findDomainOfTopic(tid);
  var h='<div class="crumb"><a onclick="nav(\'home\')">Home</a><span class="sep">/</span>';
  if(d)h+='<a onclick="nav(\'domain\',\''+d.id+'\')">'+d.name+'</a><span class="sep">/</span>';
  h+='<span>'+t.name+'</span></div>';
  h+='<h1 class="page">'+t.name+' <span class="status '+(t.status==="ready"?"ready":"todo")+'">'+(t.status==="ready"?"ready":"to do")+'</span></h1>';
  if(t.status!=="ready"){
    h+='<div class="placeholder"><h3>Not built yet</h3><p>This topic is on the map but has no content. Send me your notes for it and I will add a summary, a diagram, and an interactive quiz here.</p></div>';
    return h;
  }
  if(!S.tab)S.tab="summary";
  h+='<div class="tabs">';
  h+='<div class="tab '+(S.tab==="summary"?"on":"")+'" onclick="setTab(\'summary\')">Summary</div>';
  h+='<div class="tab '+(S.tab==="diagram"?"on":"")+'" onclick="setTab(\'diagram\')">Diagram</div>';
  h+='<div class="tab '+(S.tab==="quiz"?"on":"")+'" onclick="setTab(\'quiz\')">Quiz</div>';
  h+='</div><div class="panel" id="panel">'+panelHTML(t)+'</div>';
  return h;
}
function setTab(tb){S.tab=tb;if(tb==="quiz")quizState={};document.getElementById("panel").innerHTML=panelHTML(TOPICS[S.dom]);}
function panelHTML(t){
  if(S.tab==="summary")return '<div class="doc">'+t.summary+'</div>';
  if(S.tab==="diagram")return t.diagram+'<p style="font-size:13px;color:var(--soft);margin-top:12px">FeLV infection outcomes after exposure with the test pattern for each. The middle (regressive) column is the diagnostic trap: negative on routine antigen and IFA, positive only on low-copy PCR.</p>';
  return quizHTML(t);
}

function quizHTML(t){
  var answered=Object.keys(quizState).length,correct=0;
  Object.keys(quizState).forEach(function(k){if(quizState[k]===t.quiz[k].ans)correct++;});
  var done=answered===t.quiz.length;
  var h='<div class="qhead"><div class="qscore">'+correct+' / '+t.quiz.length+' correct <span>('+answered+' answered'+(done?', '+Math.round(correct/t.quiz.length*100)+'%':'')+')</span></div><button class="btn" onclick="resetQuiz()">Reset</button></div>';
  t.quiz.forEach(function(q,qi){
    var picked=quizState.hasOwnProperty(qi)?quizState[qi]:null;
    h+='<div class="q"><div class="stem"><b>Q'+(qi+1)+'</b>'+esc(q.stem)+'</div>';
    q.opts.forEach(function(o,oi){
      var cls="opt",mk="",dis="";
      if(picked!==null){
        dis="disabled";
        if(oi===q.ans){cls+=" correct";mk='<span class="mk">&#10003;</span>';}
        else if(oi===picked){cls+=" wrong";mk='<span class="mk">&#10007;</span>';}
      }
      h+='<button class="'+cls+'" '+dis+' onclick="answer('+qi+','+oi+')">'+String.fromCharCode(97+oi)+'. '+esc(o)+mk+'</button>';
    });
    if(picked!==null)h+='<div class="rat"><b>'+(picked===q.ans?"Correct.":"Answer: "+String.fromCharCode(97+q.ans)+".")+'</b> '+esc(q.rat)+'</div>';
    h+='</div>';
  });
  return h;
}
function answer(qi,oi){if(quizState.hasOwnProperty(qi))return;quizState[qi]=oi;document.getElementById("panel").innerHTML=panelHTML(TOPICS[S.dom]);}
function resetQuiz(){quizState={};document.getElementById("panel").innerHTML=panelHTML(TOPICS[S.dom]);}

var _hash=location.hash.replace('#','');
if(_hash.indexOf('domain-')===0){nav('domain',_hash.slice(7));}else{render();}
</script>
